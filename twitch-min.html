<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Twitch Minimal Test</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #050505;
      }

      iframe {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <iframe id="player" allowfullscreen title="Twitch minimal player"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const channel = (params.get("channel") || "wuwu_ttv").trim().toLowerCase();
      const parent =
        window.location.protocol === "file:" ||
        ["127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
          ? "localhost"
          : window.location.hostname || "localhost";

      document.querySelector("#player").src =
        `https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${encodeURIComponent(parent)}&muted=false`;
    </script>
  </body>
</html>
