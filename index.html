<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Purple GO</title>
    <link rel="preconnect" href="https://player.twitch.tv" crossorigin>
    <link rel="dns-prefetch" href="https://player.twitch.tv">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">PG</div>
        <div>
          <h1>Purple GO</h1>
          <p id="statusLine">載入頻道中</p>
        </div>
      </div>
      <div class="top-actions" aria-label="頁面操作">
        <section class="overview" aria-label="直播總覽">
          <div class="metric">
            <span class="metric-value" id="totalCount">0</span>
            <span class="metric-label">頻道</span>
          </div>
          <div class="metric live">
            <span class="metric-value" id="liveCount">0</span>
            <span class="metric-label">開台中</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="offlineCount">0</span>
            <span class="metric-label">未開台</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="unknownCount">0</span>
            <span class="metric-label">待確認</span>
          </div>
        </section>
        <button class="icon-button" id="refreshButton" type="button" title="重新整理">
          <i data-lucide="refresh-cw" aria-hidden="true"></i>
          <span>更新</span>
        </button>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="篩選頻道">
        <label class="search-box">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="searchInput" type="search" placeholder="搜尋頻道" autocomplete="off">
        </label>
        <div class="segment" role="tablist" aria-label="狀態篩選">
          <button class="segment-button" type="button" data-filter="all">全部</button>
          <button class="segment-button active" type="button" data-filter="live">開台</button>
          <button class="segment-button" type="button" data-filter="offline">離線</button>
        </div>
      </section>

      <section class="channels-section" aria-label="頻道清單">
        <div class="section-heading">
          <div class="section-title-actions">
            <h2>頻道</h2>
            <button class="pick-button" id="pickTwoButton" type="button">
              <i data-lucide="shuffle" aria-hidden="true"></i>
              <span>幫我挑兩個</span>
            </button>
            <button class="pick-button add-button" id="addChannelButton" type="button">
              <i data-lucide="plus" aria-hidden="true"></i>
              <span>新增</span>
            </button>
          </div>
          <span id="sourceBadge" class="source-badge">Sheet</span>
        </div>
        <div class="channel-grid" id="channelGrid"></div>
        <p class="empty-state" id="emptyState" hidden>沒有符合的頻道</p>
      </section>

      <section class="watch-section" aria-label="觀看直播">
        <div class="watch-heading">
          <div>
            <span class="eyebrow">Now Watching</span>
            <h2 id="watchTitle">選擇開台中的頻道</h2>
          </div>
          <button class="layout-toggle" id="watchLayoutButton" type="button" hidden>
            <i data-lucide="columns-2" aria-hidden="true"></i>
            <span id="watchLayoutLabel">不要並排</span>
          </button>
        </div>
        <div class="watch-shell" id="watchShell">
          <div class="watch-placeholder">
            <i data-lucide="radio" aria-hidden="true"></i>
            <p>目前還沒有選取直播</p>
          </div>
        </div>
      </section>
    </main>

    <dialog class="settings-dialog" id="addChannelDialog">
      <form method="dialog" class="settings-panel" id="addChannelForm">
        <div class="dialog-heading">
          <div>
            <span class="eyebrow">Custom Channel</span>
            <h2>新增直播主</h2>
          </div>
          <button class="icon-button square ghost" type="button" id="closeAddChannelButton" title="關閉">
            <i data-lucide="x" aria-hidden="true"></i>
            <span class="sr-only">關閉</span>
          </button>
        </div>

        <label class="field">
          <span>Twitch 帳號或連結</span>
          <input id="customChannelInput" name="customChannel" type="text" placeholder="例如 wuwu_ttv 或 https://www.twitch.tv/wuwu_ttv" spellcheck="false" autocomplete="off">
        </label>

        <div class="dialog-actions">
          <button class="icon-button secondary" type="button" id="cancelAddChannelButton">
            <i data-lucide="x" aria-hidden="true"></i>
            <span>取消</span>
          </button>
          <button class="icon-button" value="add" type="submit">
            <i data-lucide="plus" aria-hidden="true"></i>
            <span>加入</span>
          </button>
        </div>
      </form>
    </dialog>

    <div class="context-menu" id="customChannelMenu" hidden role="menu" aria-label="自訂頻道選單">
      <button type="button" id="removeCustomChannelButton" role="menuitem">
        <i data-lucide="trash-2" aria-hidden="true"></i>
        <span>移除</span>
      </button>
    </div>

  </body>
</html>
